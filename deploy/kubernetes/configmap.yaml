apiVersion: v1
kind: ConfigMap
metadata:
  name: sealos-notify-config
  namespace: notify-system
data:
  config.yaml: |
    server:
      address: ":8080"
      readTimeout: 30s
      writeTimeout: 30s
      idleTimeout: 60s

    database:
      host: sealos-notify-pg-postgresql
      port: 5432
      user: postgres
      password: ""
      dbname: postgres
      sslMode: disable
      maxOpenConns: 25
      maxIdleConns: 5
      connMaxLifetime: 5m

    logging:
      level: info
      format: json
      debug: false

    dispatcher:
      enabled: true
      interval: 2s
      batchSize: 20
      leaseTimeout: 5m
    
    auth:
      enabled: true
      credentialsFilePath: /etc/sealos-notify/auth/apps.yaml

    defaults:
      timeoutSeconds: 10
      maxRetry: 3
      retryBackoffSeconds: [10, 30, 60]

    channels:
      feishu_app:
        enabled: true
        provider: feishu-app-urgent

    providers:
      feishu-app-urgent:
        type: feishu_app
        appId: "${FEISHU_APP_ID}"
        appSecret: "${FEISHU_APP_SECRET}"
        receiveIdType: "open_id"
        urgentUserIdType: "open_id"
        msgType: "text"
        urgentType: "app"