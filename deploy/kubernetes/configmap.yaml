apiVersion: v1
kind: ConfigMap
metadata:
  name: sealos-notify-config
  namespace: ns-admin
data:
  config.yaml: |
    # Server configuration
    server:
      address: ":8080"
      readTimeout: 30s
      writeTimeout: 30s
      idleTimeout: 60s

    # Database configuration
    database:
      host: sealos-notify-pg-postgresql-0.sealos-notify-pg-postgresql-hl.ns-admin.svc.cluster.local
      port: 5432
      user: postgres
      password: ""
      dbname: sealos_notify
      sslMode: disable
      maxOpenConns: 25
      maxIdleConns: 5
      connMaxLifetime: 5m

    # Logging configuration
    logging:
      level: info
      format: json
      debug: false

    # Dispatcher configuration
    dispatcher:
      enabled: true
      interval: 10s
      batchSize: 100
      leaseTimeout: 5m

    # Default notification settings
    defaults:
      timeoutSeconds: 10
      maxRetry: 3
      retryBackoffSeconds: [30, 120, 300]

    # Notification channels
    channels:
      feishu_app:
        enabled: true
        provider: feishu-app-urgent

    # Channel providers
    providers:
      feishu-app-urgent:
        type: feishu_app
        appId: "${FEISHU_APP_ID}"
        appSecret: "${FEISHU_APP_SECRET}"
        receiveIdType: "open_id"
        urgentUserIdType: "open_id"
        msgType: "text"
        urgentType: "app"
