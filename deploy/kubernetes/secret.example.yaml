apiVersion: v1
kind: Secret
metadata:
  name: sealos-notify-feishu
  namespace: ns-admin
type: Opaque
stringData:
  app-id: "YOUR_FEISHU_APP_ID"
  app-secret: "YOUR_FEISHU_APP_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: sealos-notify-api-auth
  namespace: ns-admin
type: Opaque
stringData:
  apps.yaml: |
    apps:
      - appId: "notify-console"
        appSecret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
        name: "Notify Console"
        enabled: true
