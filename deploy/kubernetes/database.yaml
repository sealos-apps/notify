apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    sealos-db-provider-cr: sealos-notify-pg
    app.kubernetes.io/instance: sealos-notify-pg
    app.kubernetes.io/managed-by: kbcli
  name: sealos-notify-pg
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    sealos-db-provider-cr: sealos-notify-pg
    app.kubernetes.io/instance: sealos-notify-pg
    app.kubernetes.io/managed-by: kbcli
  name: sealos-notify-pg
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    sealos-db-provider-cr: sealos-notify-pg
    app.kubernetes.io/instance: sealos-notify-pg
    app.kubernetes.io/managed-by: kbcli
  name: sealos-notify-pg
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sealos-notify-pg
subjects:
  - kind: ServiceAccount
    name: sealos-notify-pg
apiVersion: apps.kubeblocks.io/v1alpha1
---
kind: Cluster
metadata:
  finalizers:
    - cluster.kubeblocks.io/finalizer
  labels:
    clusterdefinition.kubeblocks.io/name: postgresql
    clusterversion.kubeblocks.io/name: postgresql-14.8.0
    sealos-db-provider-cr: sealos-notify-pg
  annotations: {}
  name: sealos-notify-pg
spec:
  affinity:
    nodeLabels: {}
    podAntiAffinity: Preferred
    tenancy: SharedNode
    topologyKeys:
      - kubernetes.io/hostname
  clusterDefinitionRef: postgresql
  clusterVersionRef: postgresql-14.8.0
  componentSpecs:
    - componentDefRef: postgresql
      monitor: true
      name: postgresql
      noCreatePDB: false
      replicas: 1
      resources:
        limits:
          cpu: 2000m
          memory: 4096Mi
        requests:
          cpu: 200m
          memory: 409Mi
      serviceAccountName: sealos-notify-pg
      switchPolicy:
        type: Noop
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 3Gi
            storageClassName: openebs-backup
  terminationPolicy: Delete
  tolerations: []