apiVersion: v1
kind: Secret
metadata:
  name: sealos-notify-feishu
  namespace: sealos-notify
type: Opaque
stringData:
  app-id: "cli_xxxxxxxxxxxxxxxx"
  app-secret: "REPLACE_WITH_FEISHU_APP_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: sealos-notify-api-auth
  namespace: sealos-notify
type: Opaque
stringData:
  apps.yaml: |
    apps:
      - appId: "notify-console"
        appSecret: "REPLACE_WITH_LONG_RANDOM_SECRET"
        name: "Notify Console"
        enabled: true