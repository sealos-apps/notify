# Sealos Notify Configuration Example

# Server configuration
server:
  address: ":8080"
  readTimeout: 30s
  writeTimeout: 30s
  idleTimeout: 60s

# Database configuration
database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: sealos_notify
  sslMode: disable
  maxOpenConns: 25
  maxIdleConns: 5
  connMaxLifetime: 5m

# Logging configuration
logging:
  level: info
  format: json
  debug: false

# Dispatcher configuration
dispatcher:
  enabled: true
  interval: 10s
  batchSize: 100
  leaseTimeout: 5m

# API authentication.
# All /api/v1 APIs require app credentials. /health remains unauthenticated for probes.
# In Kubernetes this file should be mounted from a Secret and can be hot reloaded.
auth:
  enabled: true
  credentialsFilePath: /etc/sealos-notify/auth/apps.yaml

# Default notification settings
defaults:
  timeoutSeconds: 10
  maxRetry: 3
  retryBackoffSeconds: [30, 120, 300]

# Notification channels
channels:
  inapp:
    enabled: true
    provider: notification-crd
  email:
    enabled: true
    provider: smtp-default
  sms:
    enabled: true
    provider: aliyun-sms-default
  voice:
    enabled: true
    provider: volcengine-vms-default
  feishu_webhook:
    enabled: true
    provider: feishu-webhook-default
  # Feishu App urgent notification channel
  feishu_app:
    enabled: true
    provider: feishu-app-urgent

# Channel providers
providers:
  notification-crd:
    type: inapp_crd
    namespace: sealos

  smtp-default:
    type: smtp
    host: smtp.example.com
    port: 465
    username: notify@example.com
    passwordFromSecret:
      name: notify-smtp-secret
      key: password
    from: notify@example.com
    useTLS: true

  aliyun-sms-default:
    type: aliyun_sms
    endpoint: dysmsapi.aliyuncs.com
    accessKeyIdFromSecret:
      name: notify-sms-secret
      key: accessKeyId
    accessKeySecretFromSecret:
      name: notify-sms-secret
      key: accessKeySecret
    signName: SEALOS

  volcengine-vms-default:
    type: volcengine_vms
    endpoint: vms.volcengineapi.com
    apiKeyFromSecret:
      name: notify-vms-secret
      key: apiKey
    apiSecretFromSecret:
      name: notify-vms-secret
      key: apiSecret
    numberPool: default

  feishu-webhook-default:
    type: feishu_webhook
    webhookFromSecret:
      name: notify-feishu-webhook-secret
      key: url

  # Feishu App urgent notification provider
  # Obtain appId and appSecret from the Feishu/Lark Developer Console:
  # https://open.feishu.cn/app
  feishu-app-urgent:
    type: feishu_app
    # Application credentials
    appId: "YOUR_APP_ID"
    appSecret: "YOUR_APP_SECRET"
    # How recipients are identified:
    #   open_id  - Feishu Open ID (recommended)
    #   user_id  - Feishu User ID
    #   union_id - Feishu Union ID
    #   email    - User email address
    receiveIdType: "open_id"
    # Message format:
    #   text        - Plain text (default)
    #   post        - Rich text
    #   interactive - Card message
    msgType: "text"
    # Urgent notification mode (leave empty to disable):
    #   app   - In-app urgent alert (应用内加急)
    #   sms   - SMS urgent alert    (短信加急)
    #   phone - Phone call alert    (电话加急)
    urgentType: "app"

# Templates are managed at runtime via the REST API (/api/v1/templates).
# No static template configuration is needed here.
